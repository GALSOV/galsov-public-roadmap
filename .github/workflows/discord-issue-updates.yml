name: Discord issue updates

on:
  issues:
    types:
      - closed

permissions:
  contents: read
  issues: read

jobs:
  post-discord-update:
    name: Post issue closure to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_CLOSED_BY: ${{ github.actor }}
          REPO_NAME: ${{ github.repository }}
          MILESTONE_TITLE: ${{ github.event.issue.milestone.title || 'No milestone' }}
          ISSUE_LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()

          if not webhook_url:
              raise SystemExit("DISCORD_UPDATES_WEBHOOK_URL secret is missing or empty.")

          issue_number = os.environ.get("ISSUE_NUMBER", "")
          issue_title = os.environ.get("ISSUE_TITLE", "")
          issue_url = os.environ.get("ISSUE_URL", "")
          issue_closed_by = os.environ.get("ISSUE_CLOSED_BY", "")
          repo_name = os.environ.get("REPO_NAME", "")
          milestone_title = os.environ.get("MILESTONE_TITLE", "") or "No milestone"

          labels_raw = os.environ.get("ISSUE_LABELS_JSON", "[]")
          try:
              labels = json.loads(labels_raw)
          except json.JSONDecodeError:
              labels = []

          label_names = []
          for label in labels:
              name = label.get("name")
              if name:
                  label_names.append(name)

          labels_text = ", ".join(label_names) if label_names else "No labels"

          payload = {
              "username": "GALSOV Roadmap Updates",
              "embeds": [
                  {
                      "title": f"✅ Issue resolved: #{issue_number} — {issue_title}",
                      "url": issue_url,
                      "description": "A public roadmap issue has been closed.",
                      "fields": [
                          {
                              "name": "Repository",
                              "value": repo_name,
                              "inline": True
                          },
                          {
                              "name": "Milestone",
                              "value": milestone_title,
                              "inline": True
                          },
                          {
                              "name": "Closed by",
                              "value": issue_closed_by,
                              "inline": True
                          },
                          {
                              "name": "Labels",
                              "value": labels_text[:1024],
                              "inline": False
                          }
                      ]
                  }
              ]
          }

          data = json.dumps(payload).encode("utf-8")

          request = urllib.request.Request(
              webhook_url,
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "GALSOV-Roadmap-Updates/1.0"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(request) as response:
                  if response.status not in (200, 204):
                      raise SystemExit(f"Discord webhook returned status {response.status}.")
          except urllib.error.HTTPError as error:
              details = error.read().decode("utf-8", errors="replace")
              raise SystemExit(f"Discord webhook failed: {error.code} {details}")
          PY
